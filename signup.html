<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELAD L'HLAL | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #030a06;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        html[lang="ar"] body {
            font-family: 'Cairo', sans-serif;
        }
        .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: orbFloat 12s ease-in-out infinite; }
        .bg-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #10b981, transparent); top: -150px; left: -150px; }
        .bg-orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #5865f2, transparent); bottom: -100px; right: -100px; animation-delay: -4s; }
        .bg-orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #8b5cf6, transparent); top: 40%; left: 60%; animation-delay: -8s; }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-40px) scale(1.05); }
            66% { transform: translate(-20px,20px) scale(0.95); }
        }
        #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .card-wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 16px;
            animation: cardFloat 6s ease-in-out infinite;
        }
        @keyframes cardFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .card {
            background: rgba(5,18,12,0.78);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(16,185,129,0.2); border-radius: 28px;
            padding: 40px 32px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo {
            display: flex; align-items: center; gap: 16px; margin-bottom: 32px;
        }
        .logo-bar {
            width: 4px; height: 32px; background: #10b981; border-radius: 4px;
        }
        .logo-text {
            font-size: 24px; font-weight: 900; letter-spacing: -0.5px;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .logo-sub {
            font-size: 12px; font-weight: 600; color: #10b981; text-transform: uppercase;
            letter-spacing: 1px; margin-top: -4px;
        }
        .heading {
            margin-bottom: 32px;
        }
        .heading h2 {
            font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 8px;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .heading p {
            font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5;
        }
        .btn-discord {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 12px; width: 100%; padding: 14px 20px;
            background: #5865f2; color: white; font-weight: 600;
            border-radius: 12px; border: none; font-size: 16px;
            cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        .btn-discord:hover { background: #4752c4; transform: translateY(-1px); }
        .btn-discord.loading {
            background: #374151; color: #9ca3af; cursor: not-allowed;
        }
        .btn-discord.success {
            background: #10b981;
        }
        .btn-discord.success:hover {
            background: #059669;
        }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Back */
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 20;
            display: flex; align-items: center; gap: 8px;
            color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600;
            text-decoration: none; transition: color 0.2s;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            padding: 8px 14px; border-radius: 10px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: #10b981; border-color: rgba(16,185,129,0.3); }

        /* Note */
        .note { margin-top: 24px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.25); line-height: 1.7; }

        /* Error */
        .error-msg {
            display: none; margin-bottom: 16px; padding: 10px 14px; border-radius: 10px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #f87171; font-size: 13px; font-weight: 600;
            align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }

        @media (max-width: 480px) {
            .card { padding: 32px 20px 28px; border-radius: 22px; }
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back</a>

    <div class="bg-scene">
        <div class="bg-grid"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>
    <canvas id="particles"></canvas>

    <div class="card-wrap">
        <div class="card">
            <div class="logo">
                <div class="logo-bar"></div>
                <div>
                    <div class="logo-text"><span class="g">WELAD</span><span class="w"> L'HLAL</span></div>
                    <div class="logo-sub">Studio</div>
                </div>
            </div>
            <div class="heading">
                <h2>Join the Community</h2>
                <p>Sign in with Discord to access<br>the WELAD L'HLAL Roleplay Server</p>
            </div>

            <div id="errorMsg" class="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Something went wrong.</span>
            </div>

            <button class="btn-discord" id="discordBtn" onclick="loginWithDiscord()">
                <i class="fa-brands fa-discord"></i>
                Continue with Discord
            </button>

            <div class="note">
                By signing in, you agree to our server rules.
            </div>
        </div>
    </div>

    <script>
        // ── CONFIG ─────────────────────────────────────────────────────────────────
        const DISCORD_CLIENT_ID = '1508057216387907584';
        // Set this to your actual deployed URL (no trailing slash)
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = 'identify';

        // ── Particles ──────────────────────────────────────────────────────────────
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        function mkP() {
            return { x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*1.4+0.3, dx:(Math.random()-0.5)*0.35, dy:-Math.random()*0.55-0.15,
                alpha:Math.random()*0.45+0.1,
                color:Math.random()>0.55?'#10b981':Math.random()>0.5?'#5865f2':'#ffffff' };
        }
        for(let i=0;i<90;i++) particles.push(mkP());
        (function loop(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p,i)=>{
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle=p.color; ctx.globalAlpha=p.alpha; ctx.fill();
                p.x+=p.dx; p.y+=p.dy; p.alpha-=0.0007;
                if(p.alpha<=0||p.y<-10) particles[i]=mkP();
            });
            ctx.globalAlpha=1; requestAnimationFrame(loop);
        })();

        // ── Discord OAuth2 ─────────────────────────────────────────────────────────
        function generateState() {
            const arr = new Uint8Array(16);
            crypto.getRandomValues(arr);
            return Array.from(arr, b => b.toString(16).padStart(2,'0')).join('');
        }

        function loginWithDiscord() {
            const state = generateState();
            sessionStorage.setItem('discord_oauth_state', state);

            const params = new URLSearchParams({
                client_id: DISCORD_CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'token',
                scope: SCOPES,
                state: state
            });

            const btn = document.getElementById('discordBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner"></div> Connecting...';

            window.location.href = 'https://discord.com/api/oauth2/authorize?' + params.toString();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.add('show');
            const btn = document.getElementById('discordBtn');
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fa-brands fa-discord"></i> Continue with Discord';
        }

        // ── Handle OAuth Callback (fragment #access_token=...) ────────────────────
        async function handleCallback() {
            const hash = window.location.hash.substring(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const state = params.get('state');
            const error = params.get('error');

            // Clear hash from URL
            history.replaceState(null, '', window.location.pathname);

            if (error) {
                showError('Discord login was cancelled or failed.');
                return;
            }

            const savedState = sessionStorage.getItem('discord_oauth_state');
            if (!savedState || state !== savedState) {
                showError('Security check failed. Please try again.');
                return;
            }
            sessionStorage.removeItem('discord_oauth_state');

            if (!accessToken) {
                showError('No access token received.');
                return;
            }

            // Show loading
            const btn = document.getElementById('discordBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner"></div> Loading profile...';

            try {
                // Fetch Discord user info
                const res = await fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: 'Bearer ' + accessToken }
                });

                if (!res.ok) throw new Error('Failed to fetch user info');
                const user = await res.json();

                // Build avatar URL
                const avatarUrl = user.avatar
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
                    : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || 0) % 5}.png`;

                // Save session
                const session = {
                    id: user.id,
                    username: user.username,
                    discriminator: user.discriminator || '0',
                    avatar: avatarUrl,
                    global_name: user.global_name || user.username,
                    access_token: accessToken,
                    logged_in_at: new Date().toISOString()
                };
                localStorage.setItem('discord_session', JSON.stringify(session));

                // Enregistrer l'inscription dans un fichier local
                const registrations = JSON.parse(localStorage.getItem('signUpRegistrations')) || [];
                registrations.push({
                    id: user.id,
                    username: user.username,
                    global_name: user.global_name || user.username,
                    avatar: avatarUrl,
                    registered_at: new Date().toISOString()
                });
                localStorage.setItem('signUpRegistrations', JSON.stringify(registrations));

                // Marquer l'utilisateur comme inscrit
                localStorage.setItem('isRegistered', 'true');

                // Afficher un message de succès
                btn.classList.remove('loading');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Registration Successful!';
                btn.classList.add('success');

                // Ne pas rediriger automatiquement, laisser l'utilisateur décider
                // Ajouter un bouton pour aller à la page d'accueil
                setTimeout(() => {
                    // Créer un conteneur pour les boutons
                    const buttonContainer = document.createElement('div');
                    buttonContainer.className = 'mt-4 flex flex-col gap-3';
                    
                    // Bouton pour aller à la page d'accueil
                    const homeBtn = document.createElement('button');
                    homeBtn.className = 'btn-discord';
                    homeBtn.innerHTML = '<i class="fa-solid fa-house"></i> Go to Home';
                    homeBtn.onclick = () => window.location.href = 'index.html';
                    
                    // Bouton pour revenir à la page d'inscription
                    const backBtn = document.createElement('button');
                    backBtn.className = 'btn-discord bg-gray-700 hover:bg-gray-600';
                    backBtn.innerHTML = '<i class="fa-solid fa-arrow-left"></i> Back to Sign Up';
                    backBtn.onclick = () => {
                        // Effacer la session actuelle
                        localStorage.removeItem('discord_session');
                        localStorage.removeItem('isRegistered');
                        // Recharger la page d'inscription
                        window.location.reload();
                    };
                    
                    // Ajouter les boutons au conteneur
                    buttonContainer.appendChild(homeBtn);
                    buttonContainer.appendChild(backBtn);
                    
                    // Ajouter le conteneur à la page
                    btn.parentNode.appendChild(buttonContainer);
                }, 1000);

            } catch (err) {
                showError('Could not load Discord profile. Please try again.');
            }
        }

        // Redirect already registered users to home
        const existingSession = JSON.parse(localStorage.getItem('discord_session'));
        const isRegistered = localStorage.getItem('isRegistered') === 'true';

        // Only redirect if there's no OAuth hash (we're not in the middle of a callback)
        if (!window.location.hash && existingSession && existingSession.id && isRegistered) {
            window.location.href = 'index.html';
        }

        // Vérifier si c'est un retour d'OAuth
        if (window.location.hash) {
            handleCallback();
        }
    </script>
</body>
</html>
